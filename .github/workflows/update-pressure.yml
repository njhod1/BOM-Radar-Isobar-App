name: Update pressure data

on:
  schedule:
    - cron: '0,30 * * * *'   # every 30 minutes
  workflow_dispatch:          # also triggerable manually from GitHub Actions tab

permissions:
  contents: write

concurrency:
  group: pressure-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch pressure data
        run: node scripts/fetch-pressure.js

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/pressure-data.json
          git diff --cached --quiet || git commit -m 'chore: update pressure data'
          git push
